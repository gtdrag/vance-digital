<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vance.digital</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .content {
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    h1 {
      font-size: clamp(3rem, 12vw, 10rem);
      font-weight: 200;
      color: #fff;
      letter-spacing: -0.03em;
    }
    h1 span { color: #555; }
    p {
      font-size: clamp(0.9rem, 2vw, 1.3rem);
      font-weight: 300;
      color: #444;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 1.5rem;
    }
    .fade-out { animation: fadeOut 0.6s cubic-bezier(0.55, 0, 1, 0.45) forwards; }
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateY(-20px); }
    }
  </style>
</head>
<body>
  <div class="content" id="content">
    <h1>vance<span>.digital</span></h1>
  </div>
  <script>
    const pages = [
      '<h1>vance<span>.digital</span></h1>',
      '<p>Something exciting is coming soon</p>'
    ];
    let current = 0;
    const el = document.getElementById('content');

    document.body.addEventListener('click', () => {
      el.classList.add('fade-out');
      el.addEventListener('animationend', function swap() {
        el.removeEventListener('animationend', swap);
        current = (current + 1) % pages.length;
        el.innerHTML = pages[current];
        el.classList.remove('fade-out');
        el.classList.remove('content');
        void el.offsetWidth;
        el.classList.add('fade-in');
        el.addEventListener('animationend', function done() {
          el.removeEventListener('animationend', done);
          el.classList.remove('fade-in');
        });
      });
    });
  </script>
</body>
</html>
